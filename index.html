<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DataStore Explorer</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  padding: 20px;
}

select {
  padding: 10px;
  margin: 5px;
  width: 220px;
}

.box {
  margin-top: 20px;
  background: #1c1c1c;
  padding: 15px;
  border-radius: 10px;
}

pre {
  background: black;
  padding: 10px;
  border-radius: 8px;
  overflow-x: auto;
}

.row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
</style>
</head>

<body>

<h1>📦 DataStore Explorer</h1>

<div class="row">
  <select id="stores" onchange="onStoreChange()"></select>
  <select id="scopes" onchange="loadFull()"></select>
  <select id="users" onchange="loadUser()"></select>
</div>

<div class="box">
  <h3>Data Viewer</h3>
  <pre id="output">Loading...</pre>
</div>

<script>
const BASE = "http://127.0.0.1:3000";

let storeData = {};
let fullData = {};

async function loadStores() {
  try {
    const res = await fetch(BASE + "/datastore/list");
    const data = await res.json();

    storeData = data.stores || {};

    const storeSel = document.getElementById("stores");
    storeSel.innerHTML = "";

    const keys = Object.keys(storeData);

    if (keys.length === 0) {
      storeSel.innerHTML = `<option>No stores</option>`;
      return;
    }

    keys.forEach(key => {
      const opt = document.createElement("option");
      opt.value = key;
      opt.textContent = key;
      storeSel.appendChild(opt);
    });

    loadScopes();

  } catch (err) {
    console.error("loadStores error:", err);
  }
}

function loadScopes() {
  const storeKey = document.getElementById("stores").value;
  const scopeSel = document.getElementById("scopes");

  scopeSel.innerHTML = "";

  if (!storeKey || !storeData[storeKey]) {
    scopeSel.innerHTML = `<option>No scope</option>`;
    return;
  }

  const scope = storeKey.split(":")[1] || "global";

  const opt = document.createElement("option");
  opt.value = scope;
  opt.textContent = scope;

  scopeSel.appendChild(opt);

  loadFull();
}

async function loadFull() {
  try {
    const storeKey = document.getElementById("stores").value;
    const scope = document.getElementById("scopes").value;

    const name = storeKey.split(":")[0];

    const res = await fetch(BASE + "/datastore/full", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        datastore: name,
        scope
      })
    });

    const data = await res.json();

    fullData = data.data || {};

    const userSel = document.getElementById("users");
    userSel.innerHTML = "";

    const users = Object.keys(fullData);

    if (users.length === 0) {
      userSel.innerHTML = `<option>No users</option>`;
      document.getElementById("output").textContent = "Empty datastore";
      return;
    }

    users.forEach(uid => {
      const opt = document.createElement("option");
      opt.value = uid;
      opt.textContent = uid;
      userSel.appendChild(opt);
    });

    loadUser();

  } catch (err) {
    console.error("loadFull error:", err);
  }
}

function loadUser() {
  const uid = document.getElementById("users").value;

  const data = fullData[uid];

  document.getElementById("output").textContent =
    JSON.stringify(data, null, 2);
}

document.getElementById("stores").addEventListener("change", loadScopes);
document.getElementById("scopes").addEventListener("change", loadFull);
document.getElementById("users").addEventListener("change", loadUser);

setInterval(() => {
  loadStores();
}, 30000);

loadStores();
</script>
</body>
</html>
