<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DataStore Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      padding: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      cursor: pointer;
      background: #4caf50;
      color: white;
    }

    .box {
      margin-top: 20px;
      padding: 15px;
      background: #1c1c1c;
      border-radius: 10px;
    }

    pre {
      background: #000;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
    }
  </style>
</head>

<body>

<h1>📦 Roblox DataStore Viewer</h1>

<input id="datastore" placeholder="DataStore name">
<input id="scope" placeholder="Scope (global)">
<input id="userId" placeholder="User ID">

<button onclick="getData()">Get Data</button>

<div class="box">
  <h3>Result:</h3>
  <pre id="output">Waiting...</pre>
</div>

<script>
const BASE_URL = "http://127.0.0.1:3000";

async function getData() {
  const datastore = document.getElementById("datastore").value;
  const scope = document.getElementById("scope").value || "global";
  const userId = document.getElementById("userId").value;

  try {
    const res = await fetch(BASE_URL + "/datastore/get", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        datastore,
        scope,
        userId
      })
    });

    const data = await res.json();

    document.getElementById("output").textContent =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").textContent =
      "Error: " + err.message;
  }
}
</script>

</body>
</html>
