<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DataStore Explorer</title>

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  padding: 20px;
}

select {
  padding: 10px;
  margin: 5px;
  width: 200px;
}

.box {
  margin-top: 20px;
  background: #1c1c1c;
  padding: 15px;
  border-radius: 10px;
}

pre {
  background: black;
  padding: 10px;
  overflow-x: auto;
  border-radius: 8px;
}

.row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
</style>
</head>

<body>

<h1>📦 DataStore Explorer</h1>

<div class="row">
  <select id="stores" onchange="loadScopes()"></select>
  <select id="scopes" onchange="loadFull()"></select>
  <select id="users" onchange="loadUser()"></select>
</div>

<div class="box">
  <h3>Data Viewer</h3>
  <pre id="output">Loading...</pre>
</div>

<script>
const BASE = "http://127.0.0.1:3000";

let cache = {};
let fullCache = {};

// ----------------------
// LOAD ALL STORES
// ----------------------
async function loadStores() {
  const res = await fetch(BASE + "/datastore/list");
  cache = await res.json();

  const storeSel = document.getElementById("stores");
  storeSel.innerHTML = "";

  Object.keys(cache).forEach(store => {
    const opt = document.createElement("option");
    opt.value = store;
    opt.textContent = store;
    storeSel.appendChild(opt);
  });

  loadScopes();
}

// ----------------------
// LOAD SCOPES
// ----------------------
function loadScopes() {
  const store = document.getElementById("stores").value;
  const scopes = cache[store] || [];

  const scopeSel = document.getElementById("scopes");
  scopeSel.innerHTML = "";

  scopes.forEach(scope => {
    const opt = document.createElement("option");
    opt.value = scope;
    opt.textContent = scope;
    scopeSel.appendChild(opt);
  });

  loadFull();
}

// ----------------------
// LOAD FULL DATASTORE
// ----------------------
async function loadFull() {
  const store = document.getElementById("stores").value;
  const scope = document.getElementById("scopes").value;

  const res = await fetch(BASE + "/datastore/full", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      datastore: store,
      scope: scope
    })
  });

  const data = await res.json();

  fullCache = data.data || {};

  const userSel = document.getElementById("users");
  userSel.innerHTML = "";

  Object.keys(fullCache).forEach(uid => {
    const opt = document.createElement("option");
    opt.value = uid;
    opt.textContent = uid;
    userSel.appendChild(opt);
  });

  loadUser();
}

// ----------------------
// SHOW USER DATA
// ----------------------
function loadUser() {
  const uid = document.getElementById("users").value;

  const data = fullCache[uid];

  document.getElementById("output").textContent =
    JSON.stringify(data, null, 2);
}

// ----------------------
// AUTO REFRESH (30s)
// ----------------------
setInterval(() => {
  if (document.getElementById("stores").value) {
    loadFull();
  }
}, 30000);

// INIT
loadStores();
</script>

</body>
</html>
